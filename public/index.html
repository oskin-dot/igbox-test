<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreoGen — Banner Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #17171f;
    --border: #2a2a38; --accent: #c8ff00; --text: #f0f0f5;
    --muted: #6b6b80; --dim: #3a3a50; --success: #00e5a0; --error: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* HEADER */
  header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
  .logo-sub { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 4px; }
  .model-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text); outline: none; cursor: pointer; }
  .model-select:focus { border-color: var(--accent); }
  .model-select option { background: var(--surface2); }

  /* LAYOUT */
  .workspace { display: grid; grid-template-columns: 300px 1fr; flex: 1; overflow: hidden; }

  /* LEFT */
  .left { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .left::-webkit-scrollbar { width: 4px; }
  .left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section { padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; color: var(--muted); text-transform: uppercase; font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; }
  .field input, .field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field input::placeholder, .field textarea::placeholder { color: var(--dim); }
  .field textarea { resize: none; height: 90px; line-height: 1.5; font-size: 12px; }

  /* REFERENCE UPLOAD */
  .ref-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .ref-zone:hover { border-color: var(--accent); background: rgba(200,255,0,0.03); }
  .ref-zone.has-image { border-color: var(--success); border-style: solid; }
  .ref-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .ref-preview { width: 100%; max-height: 100px; object-fit: cover; border-radius: 6px; display: none; }
  .ref-placeholder { font-size: 12px; color: var(--muted); }
  .ref-placeholder span { display: block; font-size: 20px; margin-bottom: 4px; }
  .ref-clear { position: absolute; top: 6px; right: 6px; width: 20px; height: 20px; background: rgba(0,0,0,0.6); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; color: var(--text); z-index: 2; }
  .ref-zone.has-image .ref-clear { display: flex; }

  /* GENERATE */
  .gen-wrap { padding: 16px 18px; margin-top: auto; position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--border); }
  .progress-bar-wrap { margin-bottom: 10px; display: none; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-size: 11px; color: var(--muted); margin-top: 5px; font-family: 'JetBrains Mono', monospace; }
  .gen-btn { width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
  .gen-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(200,255,0,0.3); }
  .gen-btn:disabled { background: var(--surface2); color: var(--muted); transform: none; box-shadow: none; cursor: not-allowed; }
  .spinner { width: 15px; height: 15px; border: 2px solid var(--dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  .gen-btn.loading .spinner { display: block; }
  .gen-btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cost-hint { text-align: center; font-size: 11px; color: var(--muted); margin-top: 7px; font-family: 'JetBrains Mono', monospace; }
  .cost-hint b { color: var(--accent); }
  .err-box { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.25); border-radius: 8px; padding: 10px 14px; margin-top: 10px; font-size: 12px; color: var(--error); font-family: 'JetBrains Mono', monospace; line-height: 1.6; display: none; }

  /* RIGHT */
  .right { overflow-y: auto; padding: 24px; background: var(--bg); display: flex; flex-direction: column; gap: 16px; }
  .right::-webkit-scrollbar { width: 4px; }
  .right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* EMPTY */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--dim); min-height: 400px; }
  .empty-icon { font-size: 40px; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--muted); }
  .empty-sub { font-size: 12px; color: var(--dim); text-align: center; max-width: 260px; line-height: 1.6; }

  /* TOOLBAR */
  .results-toolbar { display: flex; align-items: center; justify-content: space-between; }
  .results-title { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.3px; }
  .dl-all-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: var(--accent); cursor: pointer; transition: all 0.15s; }
  .dl-all-btn:hover { background: rgba(200,255,0,0.1); }

  /* ГРУППЫ */
  .ratio-group { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .group-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .group-title { font-size: 12px; font-weight: 600; color: var(--muted); }
  .group-cards { display: flex; gap: 10px; padding: 10px; }

  /* КАРТОЧКИ */
  .preview-card { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.2s; position: relative; }
  .preview-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .preview-card.ready:hover .preview-overlay { opacity: 1; }
  .preview-thumb { width: 100%; aspect-ratio: 1/1; position: relative; overflow: hidden; background: var(--bg); }
  .preview-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; transition: transform 0.3s; }
  .preview-card:hover .preview-thumb img { transform: scale(1.03); }

  /* СКЕЛЕТОН */
  .skel { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
  .skel-spin { width: 18px; height: 18px; border: 2px solid var(--dim); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  .skel-txt { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--dim); text-align: center; padding: 0 6px; }

  .preview-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; font-size: 20px; }
  .preview-footer { padding: 6px 10px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); }
  .preview-size { font-size: 10px; font-weight: 500; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .preview-size.ready { color: var(--success); }
  .preview-dl { width: 22px; height: 22px; background: var(--surface); border: 1px solid var(--border); border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; font-size: 10px; color: var(--muted); opacity: 0; pointer-events: none; }
  .preview-dl.show { opacity: 1; pointer-events: all; }
  .preview-dl:hover { border-color: var(--accent); color: var(--accent); }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-bg.open { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal-inner { position: relative; display: flex; flex-direction: column; align-items: center; gap: 14px; max-width: 90vw; max-height: 90vh; }
  .modal-img { display: block; max-width: 88vw; max-height: 78vh; border-radius: 10px; border: 1px solid var(--border); object-fit: contain; box-shadow: 0 24px 80px rgba(0,0,0,0.6); animation: scaleIn 0.2s ease; }
  @keyframes scaleIn { from{transform:scale(0.95);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-actions { display: flex; align-items: center; gap: 10px; }
  .modal-badge { padding: 5px 14px; background: rgba(200,255,0,0.1); border: 1px solid var(--accent); border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
  .modal-dl { padding: 8px 20px; background: var(--accent); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; color: #000; cursor: pointer; transition: all 0.15s; }
  .modal-dl:hover { transform: scale(1.03); }
  .modal-close { position: fixed; top: 20px; right: 20px; width: 36px; height: 36px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--muted); transition: all 0.15s; z-index: 101; }
  .modal-close:hover { border-color: var(--accent); color: var(--accent); }
  .modal-nav { position: fixed; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--muted); transition: all 0.15s; z-index: 101; }
  .modal-nav:hover { border-color: var(--accent); color: var(--accent); }
  .modal-nav.prev { left: 20px; }
  .modal-nav.next { right: 64px; }
  .modal-nav.hidden { opacity: 0; pointer-events: none; }
  .modal-counter { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="dot"></div>
    CreoGen
    <span class="logo-sub">/ Banner Studio</span>
  </div>
  <select class="model-select" id="modelSelect" onchange="updateCost()">
    <option value="gemini-3-pro-image-preview">Nano Banana Pro 2K (~$0.13)</option>
    <option value="gemini-3.1-flash-image-preview" selected>Nano Banana 2 (~$0.07)</option>
    <option value="gemini-2.5-flash-image">Nano Banana (~$0.04)</option>
  </select>
</header>

<div class="workspace">
  <div class="left">
    <div class="section">
      <div class="section-label">API Ключ</div>
      <div class="field"><input type="password" id="apiKey" placeholder="AIzaSy..."></div>
    </div>
    <div class="section">
      <div class="section-label">Текст баннера</div>
      <div class="field">
        <label>СТРОЧКА 1 — заголовок</label>
        <input type="text" id="line1" placeholder="WELCOME BONUS" value="WELCOME BONUS">
      </div>
      <div class="field">
        <label>СТРОЧКА 2 — подзаголовок</label>
        <input type="text" id="line2" placeholder="50 Free Spins" value="5000 EUR + 250 FS">
      </div>
      <div class="field">
        <label>CTA — текст кнопки</label>
        <input type="text" id="cta" placeholder="CLAIM NOW" value="CLAIM BONUS">
      </div>
    </div>
    <div class="section">
      <div class="section-label">Визуал</div>
      <div class="field">
        <label>Опиши правую часть баннера</label>
        <textarea id="visual" placeholder="Пример: smiling woman in red dress holding smartphone with casino app, giving thumbs up, blue gradient background with golden coins flying around">Улыбающаяся девушка в вечернем красном платье с блестками, которая в одной руке держит смартфон экраном к зрителю на котором запущено приложение, а второй рукой показывает "класс". Фон в стиле iGaming — тёмный с золотыми монетами, неоновыми огнями и игорной атмосферой.</textarea>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Референс (необязательно)</div>
      <div class="ref-zone" id="refZone">
        <input type="file" accept="image/*" onchange="handleRef(event)">
        <img class="ref-preview" id="refPreview">
        <div class="ref-placeholder" id="refPlaceholder">
          <span>🖼</span>
          Загрузи пример — AI скопирует композицию
        </div>
        <div class="ref-clear" onclick="clearRef(event)">✕</div>
      </div>
    </div>
    <div class="gen-wrap">
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel">Подготовка...</div>
      </div>
      <button class="gen-btn" id="genBtn" onclick="generate()">
        <span class="btn-text">🎨 Генерировать</span>
        <div class="spinner"></div>
      </button>
      <div class="cost-hint">6 форматов · ~<b id="costEst">$0.42</b></div>
      <div class="err-box" id="errBox"></div>
    </div>
  </div>

  <div class="right" id="rightPanel">
    <div class="empty" id="emptyState">
      <div class="empty-icon">🎨</div>
      <div class="empty-title">Здесь появятся баннеры</div>
      <div class="empty-sub">Заполни поля слева и нажми «Генерировать»</div>
    </div>
    <div id="resultsArea" style="display:none; flex-direction:column; gap:16px;">
      <div class="results-toolbar">
        <div class="results-title" id="resultsTitle">ГЕНЕРАЦИЯ...</div>
        <button class="dl-all-btn" id="dlAllBtn" onclick="downloadAll()" style="display:none">⬇ Скачать все</button>
      </div>
      <div id="groupsContainer"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
  <div class="modal-close" onclick="closeModal()">✕</div>
  <div class="modal-nav prev" id="modalPrev" onclick="navigateModal(-1)">←</div>
  <div class="modal-nav next" id="modalNext" onclick="navigateModal(1)">→</div>
  <div class="modal-inner">
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-actions">
      <div class="modal-badge" id="modalBadge"></div>
      <div class="modal-counter" id="modalCounter"></div>
      <button class="modal-dl" onclick="downloadModal()">⬇ Скачать</button>
    </div>
  </div>
</div>

<script>
const GROUPS = [
  { id: '16-9',  title: 'Горизонтальный',  aiRatio: '16:9',   sizes: [
    { key: '1920x1080', label: '1920×1080', fromAI: true },
    { key: '1280x720',  label: '1280×720',  fromAI: false, scaleOf: '1920x1080', w: 1280, h: 720 },
  ]},
  { id: '1-1',   title: 'Квадрат',          aiRatio: '1:1',    sizes: [
    { key: '1080x1080', label: '1080×1080', fromAI: true },
    { key: '800x800',   label: '800×800',   fromAI: false, scaleOf: '1080x1080', w: 800, h: 800 },
  ]},
  { id: '9-16',  title: 'Вертикальный',     aiRatio: '9:16',   sizes: [
    { key: '1080x1920', label: '1080×1920', fromAI: true },
    { key: '720x1280',  label: '720×1280',  fromAI: false, scaleOf: '1080x1920', w: 720, h: 1280 },
  ]},
  { id: '191-1', title: 'Feed / OG',        aiRatio: '1.91:1', sizes: [
    { key: '1200x628', label: '1200×628', fromAI: true },
    { key: '1200x627', label: '1200×627', fromAI: false, scaleOf: '1200x628', w: 1200, h: 627 },
  ]},
  { id: '4-3',   title: 'Landscape 4:3',   aiRatio: '4:3',    sizes: [
    { key: '1024x768', label: '1024×768', fromAI: true },
  ]},
  { id: '3-4',   title: 'Portrait 3:4',    aiRatio: '3:4',    sizes: [
    { key: '768x1024', label: '768×1024', fromAI: true },
  ]},
];

const images = {};
let modalKeys = [];
let modalIndex = 0;
let refBase64 = null;
let refMime = null;

const modelPrices = {
  'gemini-3-pro-image-preview': 0.80,
  'gemini-3.1-flash-image-preview': 0.42,
  'gemini-2.5-flash-image': 0.24,
};

function updateCost() {
  const m = document.getElementById('modelSelect').value;
  document.getElementById('costEst').textContent = '$' + (modelPrices[m] || 0.42).toFixed(2);
}

// REFERENCE
function handleRef(e) {
  const file = e.target.files[0];
  if (!file) return;
  refMime = file.type;
  const reader = new FileReader();
  reader.onload = ev => {
    refBase64 = ev.target.result.split(',')[1];
    const preview = document.getElementById('refPreview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
    document.getElementById('refPlaceholder').style.display = 'none';
    document.getElementById('refZone').classList.add('has-image');
  };
  reader.readAsDataURL(file);
}

function clearRef(e) {
  e.stopPropagation();
  refBase64 = null; refMime = null;
  document.getElementById('refPreview').style.display = 'none';
  document.getElementById('refPreview').src = '';
  document.getElementById('refPlaceholder').style.display = 'block';
  document.getElementById('refZone').classList.remove('has-image');
}

function showError(msg) { const b = document.getElementById('errBox'); b.textContent = '❌ ' + msg; b.style.display = 'block'; }
function hideError() { document.getElementById('errBox').style.display = 'none'; }
function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

function buildGroups() {
  Object.keys(images).forEach(k => delete images[k]);
  modalKeys = [];
  const container = document.getElementById('groupsContainer');
  container.innerHTML = '';

  GROUPS.forEach(group => {
    const el = document.createElement('div');
    el.className = 'ratio-group';
    el.id = `group-${group.id}`;
    el.style.marginBottom = '10px';

    const cards = group.sizes.map(size => `
      <div class="preview-card" id="card-${size.key}">
        <div class="preview-thumb" id="thumb-${size.key}">
          <div class="skel">
            <div class="skel-spin"></div>
            <div class="skel-txt" id="skel-${size.key}">${size.fromAI ? 'Ожидание...' : 'После AI...'}</div>
          </div>
        </div>
        <div class="preview-footer">
          <div class="preview-size" id="sizelabel-${size.key}">${size.label}</div>
          <div class="preview-dl" id="dl-${size.key}" onclick="event.stopPropagation(); downloadOne('${size.key}')">⬇</div>
        </div>
      </div>`).join('');

    el.innerHTML = `
      <div class="group-header">
        <div class="group-title">${group.title} <span style="color:var(--dim);font-size:10px;font-family:'JetBrains Mono',monospace">${group.aiRatio}</span></div>
      </div>
      <div class="group-cards">${cards}</div>`;

    container.appendChild(el);
  });
}

function showCard(key, data, mimeType) {
  const thumb = document.getElementById(`thumb-${key}`);
  const card = document.getElementById(`card-${key}`);
  if (!thumb || !card) return;

  const src = `data:${mimeType};base64,${data}`;
  thumb.innerHTML = `<img src="${src}" alt="${key}"><div class="preview-overlay">🔍</div>`;
  card.classList.add('ready');
  card.onclick = () => openModal(key);

  const lbl = document.getElementById(`sizelabel-${key}`);
  if (lbl) lbl.classList.add('ready');
  const dl = document.getElementById(`dl-${key}`);
  if (dl) dl.classList.add('show');

  images[key] = { data, mimeType };
  if (!modalKeys.includes(key)) modalKeys.push(key);
}

function setSkel(key, text) {
  const el = document.getElementById(`skel-${key}`);
  if (el) el.textContent = text;
}

function getAIKey(ratio) {
  for (const g of GROUPS) {
    if (g.aiRatio === ratio) {
      const s = g.sizes.find(s => s.fromAI);
      return s?.key;
    }
  }
  return null;
}

function resizeImage(srcData, srcMime, targetW, targetH) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = targetW; canvas.height = targetH;
      const ctx = canvas.getContext('2d');

      // Letterbox — сохраняем пропорции без деформации
      const scale = Math.min(targetW / img.width, targetH / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      const x = (targetW - w) / 2;
      const y = (targetH - h) / 2;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, targetW, targetH);
      ctx.drawImage(img, x, y, w, h);

      resolve({ data: canvas.toDataURL('image/png').split(',')[1], mimeType: 'image/png' });
    };
    img.src = `data:${srcMime};base64,${srcData}`;
  });
}

async function processResizes(aiRatio, aiData, aiMime) {
  for (const group of GROUPS) {
    if (group.aiRatio !== aiRatio) continue;
    for (const size of group.sizes) {
      if (size.fromAI) continue;
      setSkel(size.key, 'Ресайз...');
      try {
        const resized = await resizeImage(aiData, aiMime, size.w, size.h);
        showCard(size.key, resized.data, resized.mimeType);
      } catch(e) { setSkel(size.key, '❌ Ошибка'); }
    }
  }
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const line1  = document.getElementById('line1').value.trim();
  const line2  = document.getElementById('line2').value.trim();
  const cta    = document.getElementById('cta').value.trim();
  const visual = document.getElementById('visual').value.trim();
  const model  = document.getElementById('modelSelect').value;

  if (!apiKey) return showError('Введи API ключ');
  if (!line1)  return showError('Введи заголовок');

  hideError();
  const btn = document.getElementById('genBtn');
  btn.classList.add('loading'); btn.disabled = true;

  document.getElementById('emptyState').style.display = 'none';
  const ra = document.getElementById('resultsArea');
  ra.style.display = 'flex';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('dlAllBtn').style.display = 'none';
  document.getElementById('resultsTitle').textContent = 'ГЕНЕРАЦИЯ...';

  buildGroups();
  setProgress(3, 'Подключаюсь к AI...');

  try {
    const body = { apiKey, model, line1, line2, cta, visual };
    if (refBase64 && refMime) {
      body.referenceImage = refBase64;
      body.referenceMimeType = refMime;
    }

    const response = await fetch('/api/generate-all', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || 'Ошибка сервера');
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let currentEvent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('event: ')) currentEvent = line.slice(7).trim();
        else if (line.startsWith('data: ')) {
          try { await handleEvent(currentEvent, JSON.parse(line.slice(6))); } catch {}
        }
      }
    }
  } catch (err) {
    showError(err.message);
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
    document.getElementById('progressWrap').style.display = 'none';
  }
}

async function handleEvent(event, payload) {
  if (event === 'progress') {
    const pct = Math.round((payload.step / payload.total) * 100);
    setProgress(pct, payload.message);
    if (payload.ratio) {
      const aiKey = getAIKey(payload.ratio);
      if (aiKey) setSkel(aiKey, 'AI генерирует...');
    }
  } else if (event === 'image') {
    const aiKey = getAIKey(payload.ratio);
    if (aiKey) {
      showCard(aiKey, payload.image.data, payload.image.mimeType);
      await processResizes(payload.ratio, payload.image.data, payload.image.mimeType);
    }
  } else if (event === 'error') {
    if (payload.ratio) {
      const aiKey = getAIKey(payload.ratio);
      if (aiKey) setSkel(aiKey, '❌ ' + (payload.message || 'Ошибка'));
    } else showError(payload.message || 'Ошибка');
  } else if (event === 'done') {
    setProgress(100, '✅ Готово!');
    document.getElementById('resultsTitle').textContent = `${Object.keys(images).length} ФОРМАТОВ ГОТОВО`;
    document.getElementById('dlAllBtn').style.display = 'flex';
  }
}

// MODAL
function openModal(key) {
  const img = images[key];
  if (!img) return;
  modalIndex = modalKeys.indexOf(key);
  if (modalIndex === -1) { modalKeys.push(key); modalIndex = modalKeys.length - 1; }
  renderModal();
  document.getElementById('modalBg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModal() {
  const key = modalKeys[modalIndex];
  const img = images[key];
  if (!img) return;
  document.getElementById('modalImg').src = `data:${img.mimeType};base64,${img.data}`;
  document.getElementById('modalBadge').textContent = key.replace('x', '×');
  document.getElementById('modalCounter').textContent = `${modalIndex + 1} / ${modalKeys.length}`;
  document.getElementById('modalPrev').classList.toggle('hidden', modalIndex === 0);
  document.getElementById('modalNext').classList.toggle('hidden', modalIndex === modalKeys.length - 1);
}

function navigateModal(dir) {
  const newIndex = modalIndex + dir;
  if (newIndex < 0 || newIndex >= modalKeys.length) return;
  modalIndex = newIndex;
  renderModal();
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalBg(e) {
  if (e.target === document.getElementById('modalBg')) closeModal();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('modalBg').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') navigateModal(-1);
  if (e.key === 'ArrowRight') navigateModal(1);
});

function downloadModal() {
  const key = modalKeys[modalIndex];
  if (key) downloadOne(key);
}

function downloadOne(key) {
  const img = images[key];
  if (!img) return;
  const a = document.createElement('a');
  a.href = `data:${img.mimeType};base64,${img.data}`;
  a.download = `creogen-${key}.png`;
  a.click();
}

function downloadAll() {
  Object.keys(images).forEach(key => downloadOne(key));
}

updateCost();
</script>
